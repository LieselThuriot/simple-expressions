<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            name="description"
            content="Interactive playground for simple-expressions — a small, dependency-free expression evaluator for JavaScript and TypeScript."
        />
        <title>simple-expressions playground</title>

            })();

        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
